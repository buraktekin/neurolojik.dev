<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for text -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f7f7;stop-opacity:1">
        <animate attributeName="stop-color" values="#00f7f7;#ff00ff;#00f7f7" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#ff00ff;stop-opacity:1">
        <animate attributeName="stop-color" values="#ff00ff;#00f7f7;#ff00ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#00f7f7;stop-opacity:1">
        <animate attributeName="stop-color" values="#00f7f7;#ff00ff;#00f7f7" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background neurons -->
  <g opacity="0.3">
    <!-- Neuron 1 -->
    <circle cx="100" cy="50" r="4" fill="#00f7f7">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="80" r="4" fill="#00f7f7">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="60" r="4" fill="#ff00ff">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="70" r="4" fill="#ff00ff">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="90" r="4" fill="#00f7f7">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="55" r="4" fill="#ff00ff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Connections -->
    <line x1="100" y1="50" x2="200" y2="80" stroke="#00f7f7" stroke-width="1" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="80" x2="300" y2="60" stroke="#00f7f7" stroke-width="1" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="300" y1="60" x2="500" y2="70" stroke="#ff00ff" stroke-width="1" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="70" x2="600" y2="90" stroke="#ff00ff" stroke-width="1" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="600" y1="90" x2="700" y2="55" stroke="#00f7f7" stroke-width="1" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.8s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Main text -->
  <text x="400" y="120" font-family="'Orbitron', 'Arial Black', sans-serif" font-size="64" font-weight="bold" text-anchor="middle" fill="url(#textGradient)" filter="url(#glow)">
    NEUROLOJIK
    <animate attributeName="opacity" values="1;0.8;1" dur="3s" repeatCount="indefinite"/>
  </text>
  
  <!-- Brain emoji -->
  <text x="50" y="120" font-size="48">🧠</text>
  <text x="730" y="120" font-size="48">🧠</text>
  
  <!-- Subtitle -->
  <text x="400" y="160" font-family="'Courier New', monospace" font-size="16" text-anchor="middle" fill="#00f7f7" opacity="0.8">
    Where Neurons Meet Code, Food & Photography
  </text>
  
  <!-- Animated particles -->
  <circle cx="150" cy="140" r="2" fill="#00f7f7" opacity="0.6">
    <animate attributeName="cy" values="140;120;140" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="140" r="2" fill="#ff00ff" opacity="0.6">
    <animate attributeName="cy" values="140;120;140" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
